name: quality-gate

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi gcc

      - name: Run quality gate
        shell: pwsh
        run: ./tools/quality/Run-QualityGate.ps1
